name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "23"
          registry-url: "https://registry.npmjs.org"

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          publish() {
            local dir=$1
            local name=$(node -e "console.log(require('./$dir/package.json').name)")
            local version=$(node -e "console.log(require('./$dir/package.json').version)")
            local published=$(npm view "$name@$version" version 2>/dev/null || echo "")
            if [ "$published" = "$version" ]; then
              echo "⏭ $name@$version already published"
            else
              echo "📦 Publishing $name@$version..."
              (cd $dir && npm publish --access public)
            fi
          }

          publish packages/vt100
          publish packages/vt220
          publish packages/vterm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
